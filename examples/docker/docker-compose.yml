services:
  # BGP Implementation Under Test
  frr:
    image: frrouting/frr:latest
    hostname: frr
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_ADMIN
    sysctls:
      - net.ipv4.ip_forward=1
    command: >
      sh -c "
        sed -i 's/bgpd=no/bgpd=yes/' /etc/frr/daemons &&
        sed -i 's/zebra=no/zebra=yes/' /etc/frr/daemons &&
        echo 'service integrated-vtysh-config' > /etc/frr/frr.conf &&
        echo 'router bgp 65001' >> /etc/frr/frr.conf &&
        echo ' bgp router-id 172.16.0.2' >> /etc/frr/frr.conf &&
        echo ' neighbor 172.16.0.1 remote-as 65000' >> /etc/frr/frr.conf &&
        echo 'neighbor 172.16.0.3 remote-as 65000' >> /etc/frr/frr.conf &&
        echo 'neighbor 172.16.0.4 remote-as 65000' >> /etc/frr/frr.conf &&
        echo ' address-family ipv4 unicast' >> /etc/frr/frr.conf &&
        echo '  network 10.0.0.0/8' >> /etc/frr/frr.conf &&
        echo ' exit-address-family' >> /etc/frr/frr.conf &&
        chown frr:frr /etc/frr/frr.conf &&
        /usr/lib/frr/zebra -d &&
        sleep 2 &&
        /usr/lib/frr/bgpd -f /etc/frr/frr.conf -d &&
        sleep infinity
      "
    networks:
      - bgp_net

  # BGP Test Framework
  bgp-test:
    build:
      context: ../..
      dockerfile: examples/docker/Dockerfile
    depends_on:
      - frr
    networks:
      bgp_net:
        ipv4_address: 172.16.0.3
    volumes:
      - ./results:/results
      - ../../config.yaml:/app/config.yaml:ro
    command: >
      sh -c "
        sleep 10 &&
        /app/examples/docker/run_tests.sh
      "

networks:
  bgp_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.16.0.0/24
